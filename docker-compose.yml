services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: testapi-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [app-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: testapi-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [app-net]

  postgres:
    image: postgres:16-alpine
    container_name: testapi-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-test_api}
      POSTGRES_USER: ${DB_USERNAME:-test_api}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-test_api} -d ${DB_DATABASE:-test_api}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app-net]

  redis:
    image: redis:7-alpine
    container_name: testapi-redis
    ports:
      - "6379:6379"
    networks: [app-net]

  victoria-logs:
    image: victoriametrics/victoria-logs:latest
    container_name: testapi-victoria-logs
    ports:
      - "9428:9428"
    volumes:
      - victoria-logs-data:/victoria-logs-data
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=4w
      - -httpListenAddr=:9428
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9428/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [app-net]

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: testapi-queue
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
      - postgres
    networks: [app-net]

networks:
  app-net:

volumes:
  pgdata:
  victoria-logs-data:
